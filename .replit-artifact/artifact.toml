kind = "web"
previewPath = "/"
title = "BEK Electric Systems"
version = "1.0.0"
id = "artifacts/bek-electric"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23356

[services.development]
run = "pnpm --filter @workspace/bek-electric run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bek-electric", "run", "build" ]
publicDir = "artifacts/bek-electric/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23356"
BASE_PATH = "/"
