<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4d4d8"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Floor reflection -->
  <rect x="0" y="750" width="1920" height="330" fill="#0f172a" opacity=".5"/>
  <!-- Main panel enclosure -->
  <rect x="660" y="180" width="600" height="520" rx="8" fill="url(#panel)" stroke="#71717a" stroke-width="3"/>
  <!-- Panel door -->
  <rect x="680" y="200" width="560" height="480" rx="4" fill="#e4e4e7" stroke="#a1a1aa" stroke-width="2"/>
  <!-- Control components -->
  <!-- Contactors row -->
  <rect x="720" y="240" width="80" height="60" rx="4" fill="#27272a"/>
  <rect x="820" y="240" width="80" height="60" rx="4" fill="#27272a"/>
  <rect x="920" y="240" width="80" height="60" rx="4" fill="#27272a"/>
  <rect x="1040" y="240" width="80" height="60" rx="4" fill="#27272a"/>
  <!-- Relays row -->
  <rect x="720" y="320" width="60" height="40" rx="3" fill="#1e40af"/>
  <rect x="800" y="320" width="60" height="40" rx="3" fill="#1e40af"/>
  <rect x="880" y="320" width="60" height="40" rx="3" fill="#1e40af"/>
  <rect x="960" y="320" width="60" height="40" rx="3" fill="#dc2626"/>
  <rect x="1040" y="320" width="80" height="40" rx="3" fill="#27272a"/>
  <!-- Terminal blocks -->
  <rect x="720" y="380" width="400" height="30" rx="2" fill="#f97316"/>
  <!-- Wiring channels -->
  <rect x="700" y="430" width="20" height="200" fill="#52525b"/>
  <rect x="1140" y="430" width="20" height="200" fill="#52525b"/>
  <rect x="720" y="440" width="400" height="15" fill="#52525b"/>
  <!-- MCB breakers -->
  <rect x="740" y="470" width="40" height="80" rx="3" fill="#374151"/>
  <rect x="790" y="470" width="40" height="80" rx="3" fill="#374151"/>
  <rect x="840" y="470" width="40" height="80" rx="3" fill="#374151"/>
  <rect x="890" y="470" width="40" height="80" rx="3" fill="#374151"/>
  <rect x="940" y="470" width="40" height="80" rx="3" fill="#374151"/>
  <!-- Breaker toggles (on) -->
  <rect x="752" y="475" width="16" height="8" rx="2" fill="#22c55e"/>
  <rect x="802" y="475" width="16" height="8" rx="2" fill="#22c55e"/>
  <rect x="852" y="475" width="16" height="8" rx="2" fill="#22c55e"/>
  <rect x="902" y="475" width="16" height="8" rx="2" fill="#22c55e"/>
  <rect x="952" y="475" width="16" height="8" rx="2" fill="#22c55e"/>
  <!-- Cable glands bottom -->
  <circle cx="740" cy="690" r="10" fill="#52525b"/>
  <circle cx="780" cy="690" r="10" fill="#52525b"/>
  <circle cx="820" cy="690" r="10" fill="#52525b"/>
  <circle cx="860" cy="690" r="12" fill="#52525b"/>
  <circle cx="900" cy="690" r="10" fill="#52525b"/>
  <!-- Status LEDs on door -->
  <circle cx="1180" cy="300" r="8" fill="#22c55e" opacity=".9"/>
  <circle cx="1180" cy="330" r="8" fill="#f97316" opacity=".6"/>
  <circle cx="1180" cy="360" r="8" fill="#dc2626" opacity=".3"/>
  <!-- BEK label on panel -->
  <rect x="880" y="595" width="160" height="55" rx="4" fill="#f97316"/>
  <text x="960" y="632" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="900" fill="white">BEK</text>
  <!-- Ambient glow -->
  <circle cx="960" cy="440" r="400" fill="#f97316" opacity=".04"/>
  <!-- Text overlay hint -->
  <text x="960" y="850" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#64748b" opacity=".6">[ Immagine placeholder — sostituire con foto reale: assets/hero-bg.jpg ]</text>
</svg>
